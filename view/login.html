<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         :root{
    --primary-color: #6a8ca4;
    --primary-hover: #1e4b70;
     --input-border: #ccc;
     --input-focus-border: #5585d7;
     --secoundary-color: #f5f5f5;/*for  sidee bar */
     --error-color: red;
     --text-color: #333;
     --font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
     --box-shadow: inset 0 8px 20px rgba(0,0,0,0.15);
     --link-color: #1081a7;
     --link-hover: #6a8ca4;
    }
      body {
    font-family: var(--font-family);
    background-color: var(--secoundary-color);
    align-items: center;
}

.main {
    width: 400px;
    margin: 50px auto;
    padding: 25px;
    background: var(--secoundary-color);
    border-radius: 10px;
    box-shadow: var(--box-shadow);
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 10px;
    border:var(--input-border) 1px solid;
    border-radius: 6px;
    box-sizing: border-box;
    box-shadow: var(--box-shadow);
}
input:focus{
    outline:var(--primary-color);
    box-shadow:var(--box-shadow);
    border-left: 2px solid gray;
    border-bottom: 2px solid gray;
    border-radius: 0px;
}


.submit input {
    width: 100%;
    padding: 12px;
    background-color:var(--primary-color);
    color:var(--text-col);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.submit input:hover {
    background-color: var(--primary-hover);
    color:white;
}




label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

p{
    color: var(--error-color);
    font-family: var(--font-family);
}

    </style>
</head>
<body>
    <form action="{{url_for('routes.login')}}" class="main"  method="post">
        <p>{{user}}</p>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" placeholder="example@gmail.com">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" name="password"  placeholder="Example@123">
        </div>
       
            <div class="submit">
              <input type="submit" value="submit">
            </div>
                
           

    </form>
</body>
</html>
