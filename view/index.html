<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          :root{
    --primary-color: #6a8ca4;
    --primary-hover: #1081a7;
     --input-border: #ccc;
     --input-focus-border: #a2aab8;
     --secoundary-color: #f5f5f5;/*for  sidee bar */
     --error-color: red;
     --text-color: #333;
     --font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
     --box-shadow: 0 8px 20px rgba(0,0,0,0.15);
     --link-color: #1081a7;
     --link-hover: #6a8ca4;
    }
       .container{
            height:100%;
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 50px 1fr auto;
            grid-gap:10px 10px;
            grid-template-areas: "sidebar header"
                                  " sidebar content"
                                  " sidebar content"
                                   "sidebar footer";
                        

       }
       #header{
        grid-area:header;
         border:1px solid grey;
        border-radius:4px;
       }
      
       #sidebar{
        grid-area:sidebar;
        border:var(--input-border) 1px solid;
        border-radius:4px;
       }
        #content{

        grid-area:content;
       }
       #footer{
        grid-area:footer;
        background-color:var(--secoundary-color);
         border:var(--input-border) 1px solid;
        border-radius:4px;
       }
       #toggle{
        display: none;
       }
       #toggle:checked ~.container{
 grid-template-columns:0 1fr ;
       }
       #toggle:checked ~.container #sidebar{
        display: none;
       }
       #header ul{
        display: flex;
        list-style:none;
        justify-content: flex-end;
        padding: 0px;
       
        gap: 20px;

       }
       #sidebar {
    transition: 0.02s ease-in-out;
    overflow: hidden;
}
.avater{
    width: 25px;
    height:25px;
    background-color: var(--primary-color);
    color: white;
    border: 1px solid var(--input-border);
    border-radius:50%;
    display:flex;
    align-items: center;
    justify-content:center;
    font-size: 14x;
    font-weight:400;
    text-transform: lowercase;

}

    </style>
</head>
<body>
    
    <input type="checkbox" id="toggle">
    <label for="toggle">☰ </label>
   <div class="container"> 
    <div  id="header" style="background-color: green;">
        <ul>
    {% if user %}
        <div class="avater"><li>{{ user.name.split()[0][0] }}</li></div>
        <li>about</li>
        <li>contact</li>
        <li><a href="/logout">logout</a></li>
    {% else %}
        <li><a href="{{ url_for('routes.login') }}">login</a></li>
        <li>about</li>
        <li>contact</li>
    {% endif %}
</ul>
    </div>
    <div  id="sidebar" style="background-color:blue;">sidebar</div>
    <div  id="content"   style="background-color: red;">content</div>
    <div  id="footer" style="background-color:whitesmoke;">footer</div></div>
</body>
</html>
