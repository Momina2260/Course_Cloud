<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    :root{
    --primary-color: #6a8ca4;
    --primary-hover: #1e4b70;
     --input-border: #ccc;
     --input-focus-border: #3378f0;
     --secoundary-color: #f5f5f5;/*for  sidee bar */
     --error-color: red;
     --text-color: #333;
     --font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
     --box-shadow: 0 8px 20px rgba(0,0,0,0.15);
     --link-color: #1081a7;
     --link-hover: #6a8ca4;
    }
   body {
    font-family: var(--font-family);
    background-color: var(--secoundary-color);
    align-items: center;
}

.main {
    width: 400px;
    margin: 50px auto;
    padding: 25px;
    background: white;
    border-radius: 10px;
    box-shadow: var(--box-shadow);
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 10px;
    border:var(--input-border) 1px solid;
    border-radius: 6px;
    box-sizing: border-box;
    box-shadow: var(--box-shadow);
}

input:focus{
    outline:var(--primary-color);
    box-shadow:var(--box-shadow);
    border-left: 2px solid gray;
    border-bottom: 2px solid gray;
    border-radius: 0px;
}

.submit input {
    width: 100%;
    padding: 12px;
    background-color:var(--primary-color);
    color:var(--text-color);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.submit input:hover {
    background-color: var(--primary-hover);
    color:white;
}




label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

.radio-group {
    display: flex;
    gap: 15px;
}

.radio-group label {
    font-weight: normal;
}

p{
    color: var(--error-color);
    font-family: var(--font-family);
}
.login-link  {
    color: var(--link-color);
    text-decoration:none;
}
    </style>
</head>
<body>
   
   <div class="main">
    <form action="{{url_for('routes.register')}}" method="post">

        <div class="form-group">
            <p > {{message}}</p>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name here..." required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Example@123" required>
        </div>

        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>
        </div>

        <div class="form-group">
            <label>Role</label>
            <div class="radio-group">
                <label><input type="radio" name="role" value="teacher"> Teacher</label>
                <label><input type="radio" name="role" value="student"> Student</label>
            </div>
        </div>

        <div class="submit"  url>
            <input type="submit" value="Register">
        </div>
        <div>

            <p class="login-link">
        Already have an account? 
        <a href="{{ url_for('routes.login') }}">Login</a>
        </p>
        </div>

    </form>
</div>
   </div>
</body>
</html>
