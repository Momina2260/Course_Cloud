<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>course_detail</title>
    <style>
       body {
        font-family: Arial, sans-serif;
        margin: 0px;
        display: grid;
         place-items: center;   /* centers container */
        min-height: 100vh;
        }
        .lectures_container{
         
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 65%;
            margin: 50px auto;
            border:1PX solid  grey;
            border-radius:10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding:6px;
        }
        .lectures{
            font-family: Arial, sans-serif;
            background-color:  whitesmoke;
            border:1px solid grey;
            border-radius:6px;
            list-style: none;
            margin: 0;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            
        }
       .search-form {
        position: relative;
         }
      
            .search-form input 
        {
            padding-left: 35px;
            height: 35px;
            border: 1px solid grey;
            border-radius: 6px;
            outline: none;
        }

        .search-form input:focus
     {
        outline: none;
        border-color: #a2aab8;
        box-shadow: 0 0 5px rgba(155, 157, 155, 0.4);
      }
      .top{
         
         width: 100%;
         display:flex;
         justify-content:space-between;
         align-items: center;
    
         }
         .top button{
            background-color:  whitesmoke;
            border: 1px solid #ccc;
            border-radius:6px;
            padding: 6px;
         }
         .search-form::before 
         {
            content: "⌕"; 
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 25px;
            color: grey;
        }

    </style>
</head>

<body>
    
   
    <div class="lectures_container">
         <div class="top">
                            <div>
                                <a href="{{url_for('routes.addlec')}}">
                                    <button>addlecture</button>
                                </a>
                            </div>
                            <div>
                                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                              <form action="{{url_for('routes.course_detail')}}" method="get" class="search-form">
                                    <input type="text" name="search" 
                                        value="{{ request.args.get('search', '') }}"
                                        placeholder=" Search for course...">
                            </form>
                            </div>

        </div>
                  
                 {% for lecture in lectures %}
           <div>
                    {% if request.args.get('search') %}
                     <p>Showing results for: <strong>"{{ request.args.get('search') }}"</strong></p>
                        {% endif %}
                        
                    <li class="lectures">
                        <a href="lecture_detail.html"><strong>{{ lecture.title }}</strong><br></a>
                        <strong>{{ lecture.description }}</strong><br>
                        {{ lecture.vedio_url }}
                    </li>
            </div>
                {% endfor %}

    </div>

</body>

</html>
